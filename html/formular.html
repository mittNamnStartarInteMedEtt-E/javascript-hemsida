<body>

    <!-- navbar -->

        <ul class="navbar">
            <li><a href="/"><img src="/bilder/arnes-logga.png" alt="logga"></a></li>

    </nav>
    <!-- slut navbar -->

    <!-- start huvudinnehåll-->
    <div id="main-content">

        <h1>Kontaktformulär</h1>
        <p>Fyll i dina uppgifter och välj vad du vill göra. Vi återkommer så snart som möjligt.</p>

        <form>
            <label for="name">Namn:</label>
            <input type="text" id="name" name="name" placeholder="Billy Svensson">

            <label for="email">E-post:</label>
            <input type="email" id="email" name="email" placeholder="billy.svensson@example.com">

            <label for="service">Vad vill du göra?</label>
            <select id="service" name="service">
                <option value="">Välj ett alternativ</option>
                <option value="gravhjalp">Jag vill hyra grävhjälp</option>
                <option value="maskiner">Jag vill hyra maskiner</option>
                <option value="annat">Annat</option>
            </select>

            <label for="message">Meddelande:</label>
            <textarea id="message" name="message" rows="5"></textarea>

            <button type="submit">Skicka</button>
        </form>

    </div>

    <footer>© Arnes Grävtjänst 2026</footer>

</body>
